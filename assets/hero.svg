<svg width="900" height="380" viewBox="0 0 900 380" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0c29"/>
      <stop offset="50%" stop-color="#302b63"/>
      <stop offset="100%" stop-color="#24243e"/>
    </linearGradient>
    <linearGradient id="neon" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00f5d4"/>
      <stop offset="100%" stop-color="#7b61ff"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="900" height="380" rx="20" fill="url(#bg)"/>

  <!-- grid dots -->
  <g fill="#ffffff" opacity="0.05">
    <circle cx="60" cy="60" r="2"/><circle cx="160" cy="60" r="2"/><circle cx="260" cy="60" r="2"/>
    <circle cx="760" cy="320" r="2"/><circle cx="660" cy="320" r="2"/><circle cx="560" cy="340" r="2"/>
  </g>

  <!-- title -->
  <text x="48" y="92" font-size="42" font-weight="800" fill="#ffffff">CartPole RL Sandbox</text>
  <text x="50" y="124" font-size="18" fill="#9bf6e4">Pure-vanilla-JS reinforcement learning, live in the browser</text>

  <!-- badges row -->
  <g font-size="13" font-weight="600">
    <rect x="50" y="146" width="150" height="26" rx="13" fill="#00f5d4" opacity="0.15"/>
    <text x="125" y="164" fill="#00f5d4" text-anchor="middle">No ML libraries</text>
    <rect x="212" y="146" width="150" height="26" rx="13" fill="#7b61ff" opacity="0.18"/>
    <text x="287" y="164" fill="#bcacff" text-anchor="middle">REINFORCE + GA</text>
    <rect x="374" y="146" width="120" height="26" rx="13" fill="#ff6b9d" opacity="0.18"/>
    <text x="434" y="164" fill="#ffa6c4" text-anchor="middle">~900 LoC</text>
  </g>

  <!-- Cart + pole illustration -->
  <g transform="translate(560,150)">
    <line x1="-40" y1="120" x2="320" y2="120" stroke="#4d4870" stroke-width="3"/>
    <!-- pole -->
    <line x1="140" y1="118" x2="178" y2="20" stroke="url(#neon)" stroke-width="8" stroke-linecap="round" filter="url(#glow)"/>
    <circle cx="178" cy="20" r="10" fill="#00f5d4" filter="url(#glow)"/>
    <!-- cart -->
    <rect x="105" y="98" width="70" height="30" rx="6" fill="#7b61ff" filter="url(#glow)"/>
    <circle cx="120" cy="132" r="8" fill="#24243e" stroke="#9bf6e4" stroke-width="2"/>
    <circle cx="160" cy="132" r="8" fill="#24243e" stroke="#9bf6e4" stroke-width="2"/>
    <!-- force arrows -->
    <text x="60" y="90" font-size="22" fill="#ff6b9d">&#8592;</text>
    <text x="210" y="90" font-size="22" fill="#00f5d4">&#8594;</text>
  </g>

  <!-- mini neural net -->
  <g transform="translate(70,210)" stroke="#5a5587" stroke-width="1" opacity="0.9">
    <g fill="#00f5d4">
      <circle cx="0" cy="20" r="6"/><circle cx="0" cy="50" r="6"/><circle cx="0" cy="80" r="6"/><circle cx="0" cy="110" r="6"/>
    </g>
    <g fill="#7b61ff">
      <circle cx="90" cy="35" r="6"/><circle cx="90" cy="65" r="6"/><circle cx="90" cy="95" r="6"/>
    </g>
    <g fill="#ff6b9d">
      <circle cx="180" cy="50" r="6"/><circle cx="180" cy="80" r="6"/>
    </g>
    <g stroke="#00f5d4" opacity="0.25">
      <line x1="0" y1="20" x2="90" y2="35"/><line x1="0" y1="20" x2="90" y2="65"/><line x1="0" y1="20" x2="90" y2="95"/>
      <line x1="0" y1="50" x2="90" y2="35"/><line x1="0" y1="50" x2="90" y2="65"/><line x1="0" y1="50" x2="90" y2="95"/>
      <line x1="0" y1="80" x2="90" y2="35"/><line x1="0" y1="80" x2="90" y2="65"/><line x1="0" y1="80" x2="90" y2="95"/>
      <line x1="0" y1="110" x2="90" y2="35"/><line x1="0" y1="110" x2="90" y2="65"/><line x1="0" y1="110" x2="90" y2="95"/>
    </g>
    <g stroke="#7b61ff" opacity="0.3">
      <line x1="90" y1="35" x2="180" y2="50"/><line x1="90" y1="35" x2="180" y2="80"/>
      <line x1="90" y1="65" x2="180" y2="50"/><line x1="90" y1="65" x2="180" y2="80"/>
      <line x1="90" y1="95" x2="180" y2="50"/><line x1="90" y1="95" x2="180" y2="80"/>
    </g>
  </g>
  <g font-size="11" fill="#9bf6e4" text-anchor="middle">
    <text x="70" y="350">4 state</text>
    <text x="160" y="350">N hidden</text>
    <text x="250" y="350">2 actions</text>
  </g>

  <text x="850" y="358" font-size="12" fill="#6f6a99" text-anchor="end">tanh &#183; softmax &#183; manual backprop</text>
</svg>
