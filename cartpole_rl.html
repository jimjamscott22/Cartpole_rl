<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CartPole RL Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard-container">
        <header>
            <h1>CartPole RL Sandbox</h1>
            <div class="status-badge" id="statusBadge">Training Mode</div>
        </header>
        
        <div class="main-content">
            <!-- Controls Sidebar -->
            <aside class="controls-panel glass-panel">
                <h2>Controls</h2>
                <div class="control-group btn-group">
                    <button id="startBtn" class="btn primary">Start</button>
                    <button id="pauseBtn" class="btn secondary">Pause</button>
                </div>
                
                <div class="toggle-container">
                    <label class="toggle-switch">
                        <input type="checkbox" id="testModeToggle">
                        <span class="slider round"></span>
                    </label>
                    <span class="toggle-label">Test Mode (No Exploration)</span>
                </div>

                <div class="control-group">
                    <label>Simulation Speed: <span id="speedVal" class="val-display">1x</span></label>
                    <input type="range" id="speedSlider" min="1" max="50" value="1">
                </div>

                <div class="control-group">
                    <label>Learning Rate</label>
                    <input type="number" id="lrInput" value="0.01" step="0.001">
                </div>

                <div class="control-group">
                    <label>Gamma (Discount)</label>
                    <input type="number" id="gammaInput" value="0.99" step="0.01" max="1">
                </div>

                <div class="control-group">
                    <label>Hidden Nodes</label>
                    <input type="number" id="hiddenInput" value="8" min="1">
                </div>

                <div class="control-group" style="margin-top: 10px;">
                    <button id="resetBtn" class="btn warning">Apply Params / Reset</button>
                </div>

                <div class="separator"></div>
                
                <div class="control-group btn-group">
                    <button id="saveBtn" class="btn outline">Save Model</button>
                    <button id="loadBtn" class="btn outline">Load Model</button>
                    <input type="file" id="fileInput" style="display: none;" accept=".json">
                </div>
            </aside>

            <!-- Visualization Center -->
            <section class="visualization-panel">
                <div class="canvas-container glass-panel">
                    <h3>Environment</h3>
                    <canvas id="cartpoleCanvas" width="650" height="250"></canvas>
                </div>
                
                <div class="canvas-container glass-panel">
                    <h3>Performance</h3>
                    <canvas id="chartCanvas" width="650" height="200"></canvas>
                </div>
            </section>

            <!-- Network & Metrics Right Panel -->
            <aside class="network-panel glass-panel">
                <h3>Policy Network</h3>
                <svg id="networkSvg" width="280" height="250"></svg>

                <div class="policy-insight">
                    <h3>Policy Insight</h3>
                    <div class="prob-row">
                        <span class="prob-label">P(Left)</span>
                        <div class="prob-bar">
                            <div class="prob-fill left" id="probLeftFill"></div>
                        </div>
                        <span class="prob-value" id="probLeftVal">50.0%</span>
                    </div>
                    <div class="prob-row">
                        <span class="prob-label">P(Right)</span>
                        <div class="prob-bar">
                            <div class="prob-fill right" id="probRightFill"></div>
                        </div>
                        <span class="prob-value" id="probRightVal">50.0%</span>
                    </div>
                    <div class="confidence-row">
                        Confidence:
                        <span id="policyConfidence">0.0%</span>
                    </div>
                </div>
                
                <div class="metrics-container" id="metrics">
                    <div class="metric-box">
                        <span class="metric-label">Episode</span>
                        <span class="metric-value" id="episode">0</span>
                    </div>
                    <div class="metric-box">
                        <span class="metric-label">Steps</span>
                        <span class="metric-value" id="steps">0</span>
                    </div>
                    <div class="metric-box">
                        <span class="metric-label">Return</span>
                        <span class="metric-value" id="episodeReturn">0</span>
                    </div>
                    <div class="metric-box">
                        <span class="metric-label">Avg (50)</span>
                        <span class="metric-value" id="avgReturn">0</span>
                    </div>
                </div>
            </aside>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
